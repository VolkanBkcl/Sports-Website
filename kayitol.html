<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol - ByteForce</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--white);
        }
        .register-container {
            display: flex;
            height: 100vh;
        }
        .register-left {
            flex: 1;
            background: linear-gradient(rgba(26,26,26,0.7), rgba(255,77,77,0.3)), url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=900&q=80') center center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            flex-direction: column;
            padding: 2rem;
        }
        .register-left h2 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--white);
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .register-left p {
            font-size: 1.2rem;
            max-width: 400px;
            color: var(--white);
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .register-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--white);
        }
        .register-form {
            background: var(--white);
            padding: 2.5rem 2rem;
            border-radius: 10px;
            box-shadow: var(--box-shadow);
            width: 100%;
            max-width: 400px;
        }
        .register-form h2 {
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-color);
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 1rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--secondary-color);
        }
        .submit-btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--secondary-color);
            color: var(--white);
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        .submit-btn:hover {
            background: var(--accent-color);
        }
        .login-link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: var(--secondary-color);
            text-decoration: none;
            font-size: 1rem;
        }
        .login-link:hover {
            text-decoration: underline;
        }
        @media (max-width: 900px) {
            .register-container {
                flex-direction: column;
            }
            .register-left, .register-right {
                flex: unset;
                width: 100%;
                min-height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-left">
            <h2>Motivasyonunu Yüksek Tut!</h2>
            <p>Başarı, her gün attığın küçük adımlarla gelir. Hedeflerine ulaşmak için bugün başla ve asla pes etme!</p>
        </div>
        <div class="register-right">
            <form class="register-form">
                <h2>Kayıt Ol</h2>
                <div class="form-group">
                    <label for="name">Ad Soyad</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">E-posta</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Şifre</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-group">
                    <label for="password-confirm">Şifre Tekrar</label>
                    <input type="password" id="password-confirm" name="password-confirm" required>
                </div>
                <button type="submit" class="submit-btn">Kayıt Ol</button>
                <a href="giris.html" class="login-link">Zaten hesabın var mı? Giriş Yap</a>
            </form>
        </div>
    </div>
    <script>
        // Form gönderimini dinle
        document.querySelector('.register-form').addEventListener('submit', async (e) => {
            // Sayfanın yenilenmesini engelle
            e.preventDefault();
            
            // Form verilerini al
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('password-confirm').value;

            // Boş alan kontrolü
            if (!name || !email || !password || !passwordConfirm) {
                alert('Lütfen tüm alanları doldurunuz!');
                return;
            }

            // E-posta formatı kontrolü
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                alert('Lütfen geçerli bir e-posta adresi giriniz!');
                return;
            }

            // Şifre uzunluğu kontrolü
            if (password.length < 6) {
                alert('Şifre en az 6 karakter olmalıdır!');
                return;
            }

            // Şifre eşleşme kontrolü
            if (password !== passwordConfirm) {
                alert('Girdiğiniz şifreler eşleşmiyor!');
                return;
            }

            // İsim ve soyisim ayırma
            const [firstName, ...lastNameParts] = name.split(' ');
            const lastName = lastNameParts.join(' ');

            // İsim kontrolü
            if (!firstName || !lastName) {
                alert('Lütfen adınızı ve soyadınızı tam olarak giriniz!');
                return;
            }

            try {
                console.log('Kayıt isteği gönderiliyor...');
                // Kayıt isteği gönder
                const response = await fetch('http://localhost:8080/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        firstName,
                        lastName,
                        email,
                        password
                    })
                });

                console.log('Sunucu yanıtı alındı:', response.status);
                const data = await response.json();
                console.log('Sunucu yanıtı:', data);

                if (response.ok) {
                    // Token ve kullanıcı bilgilerini kaydet
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    alert('Kayıt işleminiz başarıyla tamamlandı! Giriş yapabilirsiniz.');
                    window.location.href = 'index.html';
                } else {
                    // Sunucudan gelen hata mesajını göster
                    if (data.errors) {
                        const hataMesajlari = Object.values(data.errors).join('\n');
                        alert('Kayıt işlemi başarısız:\n' + hataMesajlari);
                    } else {
                        alert(data.message || 'Kayıt işlemi sırasında bir hata oluştu. Lütfen daha sonra tekrar deneyiniz.');
                    }
                }
            } catch (error) {
                console.error('Kayıt hatası:', error);
                if (error.name === 'TypeError' && error.message.includes('Failed to fetch')) {
                    alert('Sunucuya bağlanılamıyor. Lütfen sunucunun çalıştığından emin olun ve tekrar deneyin.');
                } else {
                    alert('Bir hata oluştu: ' + error.message);
                }
            }
        });
    </script>
</body>
</html>
